version: 2

models:

  - name: dim_customers
    description: >
      One row per real-world customer (`customer_unique_id`). 
      Combines static customer information with aggregated lifetime order metrics
      to support customer-level analysis, segmentation, and lifetime value calculations.
    columns:
      - name: customer_unique_id
        description: Unique identifier representing a real-world customer across orders.
        tests:
          - not_null
          - unique
      - name: customer_zip_code_prefix
        description: First 5 digits of the customer’s Brazilian ZIP code.
      - name: customer_city
        description: City where the customer resides.
      - name: customer_state
        description: Two-letter Brazilian state code of the customer.
      - name: first_order_at
        description: Timestamp of the customer’s first order.
      - name: last_order_at
        description: Timestamp of the customer’s most recent order.
      - name: lifetime_order_count
        description: Total number of orders placed by the customer.
      - name: lifetime_revenue
        description: Total revenue generated by the customer across all orders.
      - name: avg_order_value
        description: Average revenue per order for this customer.
      - name: avg_actual_delivery_days
        description: Average number of days it actually took for delivered orders to reach the customer.
      - name: avg_estimated_delivery_days
        description: Average number of days that were promised for delivery.
      - name: late_delivery_count
        description: Number of orders delivered after the promised delivery date.
      - name: delivered_order_count
        description: Number of successfully delivered orders.
      - name: late_delivery_percentage
        description: Percentage of delivered orders that were late.

  - name: dim_products
    description: >
      One row per product (`product_id`). Includes product attributes, size/dimension
      information, and category metadata to support product-level analysis, pricing,
      and inventory insights.
    columns:
      - name: product_id
        description: Unique identifier for the product.
        tests:
          - not_null
          - unique
      - name: product_category_name
        description: Product category name in Portuguese.
      - name: product_name_length
        description: Length of the product name (number of characters).
      - name: product_description_length
        description: Length of the product description (number of characters).
      - name: product_photos_qty
        description: Number of product photos available.
      - name: product_weight_g
        description: Product weight in grams.
      - name: product_length_cm
        description: Product length in centimeters.
      - name: product_height_cm
        description: Product height in centimeters.
      - name: product_width_cm
        description: Product width in centimeters.

  - name: dim_sellers
    description: >
      One row per seller (`seller_id`). Combines seller location and ZIP code data
      to enable seller-level analysis, performance metrics, and geographic insights.
    columns:
      - name: seller_id
        description: Unique identifier for the seller.
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        description: First 5 digits of the seller’s ZIP code.
      - name: seller_city
        description: City where the seller is located.
      - name: seller_state
        description: Two-letter Brazilian state code of the seller.